<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="CNE Toolkit – Networking Tools">

    <title>CNE Toolkit</title>

    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&family=Inter:wght@300;600&display=swap" rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" href="./css/style.css">

    <!-- Libraries (ONLY ONCE) -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>
</head>

<body>

    <div class="app-container">

        <!-- HEADER -->
        <header class="mobile-header">
            <div class="brand">
                <i data-lucide="network"></i>
                <span>CNE Toolkit</span>
            </div>

            <div>
                <button id="mobileThemeToggle">🌙</button>
                <button id="mobileLangToggle">AR</button>
                <button id="menuToggleBtn">☰</button>
            </div>
        </header>

        <!-- SIDEBAR -->
        <aside class="sidebar" id="sidebar">
            <nav class="sidebar-nav">
                <a href="#/" data-page="home" class="nav-link active">Dashboard</a>
                <a href="#/ip-analyzer" data-page="ip-analyzer">IP Analyzer</a>
                <a href="#/subnet-calculator" data-page="subnet-calculator">Subnet</a>
                <a href="#/port-lookup" data-page="port-lookup">Ports</a>
                <a href="#/password-generator" data-page="password-generator">Password</a>
                <a href="#/binary-converter" data-page="binary-converter">Binary</a>
                <a href="#/qr-generator" data-page="qr-generator">QR Generator</a>
                <a href="#/learn" data-page="learn">Learn</a>
                <a href="#/about" data-page="about">About</a>
            </nav>
        </aside>

        <div id="sidebarOverlay"></div>

        <!-- CONTENT -->
        <main class="main-content">
            <div id="page-content"></div>
        </main>

    </div>

    <!-- JS -->
    <script src="./js/translations.js"></script>
    <script src="./js/utils.js"></script>

    <script src="./js/components/ip-analyzer.js"></script>
    <script src="./js/components/subnet-calculator.js"></script>
    <script src="./js/components/port-lookup.js"></script>
    <script src="./js/components/password-generator.js"></script>
    <script src="./js/components/binary-converter.js"></script>
    <script src="./js/components/qr-generator.js"></script>
    <script src="./js/components/learn.js"></script>
    <script src="./js/components/about.js"></script>

    <script src="./js/app.js"></script>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            if (window.lucide) lucide.createIcons();
        });
    </script>

</body>
</html>
